- name: Install prerequisite packages
  apt:
    name:
      - curl
      - gnupg
      - ca-certificates
      - apt-transport-https
    state: present
    update_cache: yes

- name: Create apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Docker GPG key
  shell: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
      | gpg --dearmor --yes -o /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Add Docker repository
  shell: |
    echo \
      "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
      https://download.docker.com/linux/ubuntu \
      $(. /etc/os-release && echo $VERSION_CODENAME) stable" \
      > /etc/apt/sources.list.d/docker.list

- name: Update apt cache
  apt:
    update_cache: yes

- name: Install containerd
  apt:
    name:
      - containerd.io
    state: present

- name: Create containerd config directory
  file:
    path: /etc/containerd
    state: directory

- name: Generate default containerd config
  shell: |
    containerd config default > /etc/containerd/config.toml
  args:
    creates: /etc/containerd/config.toml

- name: Ensure CRI plugin is enabled
  shell: |
    sed -i 's/disabled_plugins = \["cri"\]/disabled_plugins = []/' \
      /etc/containerd/config.toml || true

- name: Enable SystemdCgroup
  replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'

- name: Restart containerd
  systemd:
    name: containerd
    enabled: yes
    state: restarted

- name: Wait for containerd socket
  wait_for:
    path: /run/containerd/containerd.sock
    timeout: 30

###############################################################################
# Install crictl
###############################################################################

- name: Download crictl
  get_url:    
    url: "https://github.com/kubernetes-sigs/cri-tools/releases/download/v{{ crictl_version }}/crictl-v{{ crictl_version }}-linux-amd64.tar.gz"
    dest: /tmp/crictl.tar.gz

- name: Extract crictl
  unarchive:
    src: /tmp/crictl.tar.gz
    dest: /usr/local/bin
    remote_src: yes

- name: Configure crictl
  copy:
    dest: /etc/crictl.yaml
    content: |
      runtime-endpoint: unix:///run/containerd/containerd.sock
      image-endpoint: unix:///run/containerd/containerd.sock
      timeout: 10
      debug: false

###############################################################################
# Verify containerd
###############################################################################

- name: Get containerd version
  command: containerd --version
  register: containerd_version_output
  changed_when: false

- name: Print containerd version
  debug:
    msg: "containerd version: {{ containerd_version_output.stdout }}"

###############################################################################
# Verify crictl
###############################################################################

- name: Get crictl version
  command: crictl --version
  register: crictl_version_output
  changed_when: false

- name: Print crictl version
  debug:
    msg: "crictl version: {{ crictl_version_output.stdout }}"